# This data structure is used by multiple roles and conains key:value pairs
# from all roles that use the hub_ee_repositories variable.
# collection_repository
# collection_repository_sync

---
hub_collection_repositories:
  - name: 'validated'
    distribution:
      name: 'validated'
      state: 'present'
    remote: 'rh-validated'
    wait: false
  - name: 'rh-certified'
    distribution:
      name: 'rh-certified'
      state: 'present'
    remote: 'rh-certified'
    wait: false
  - name: 'community'
    distribution:
      name: 'community'
      state: 'present'
    remote: 'community'
    wait: false
...
