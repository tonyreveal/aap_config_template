# READ DOCUMENTATION FOR THIS ROLE BEFORE DEFINING PERMISSIONS AS CODE TO
# ENSURE UNDERSTANDING

---
controller_roles:
  - team: 'Use_Demo'
    roles:
      - 'read'
      - 'execute'
    job_templates:
      - 'Demo Job Template'
    state: "{{ absent_present }}"

  - team: 'Use_Demo'
    roles:
      - 'read'
      - 'use'
    projects:
      - 'Demo Project'
    inventories:
      - 'Demo Inventory'
...
