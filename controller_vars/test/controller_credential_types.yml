# Refer to https://github.com/redhat-cop/controller_configuration/tree/devel/roles/credential_types
# for documentation and additional parameter information

---
controller_credential_types:
  - name: API Credential Type
    new_name: API Credential Type
    kind: cloud
    state: "{{ absent_present }}"
    inputs:
      fields:
        - id: hostname
          label: Hostname
          type: string
        - id: username
          label: Username
          type: string
        - id: password
          label: Password
          type: string
          secret: true
      required:
        - hostname
        - username
        - password
    injectors:
      env:
        API_HOSTNAME: "{% raw %}{  { hostname }}{% endraw %}"                 # DO NOT REMOVE SPACES - removing them will cause an error.
        API_USERNAME: "{% raw %}{  { username }}{% endraw %}"         # DO NOT REMOVE SPACES - removing them will cause an error.
        API_PASSWORD: "{% raw %}{  { password }}{% endraw %}"         # DO NOT REMOVE SPACES - removing them will cause an error.
...
