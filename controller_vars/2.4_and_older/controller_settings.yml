---
controller_settings:
  settings:
    AUTH_LDAP_SERVER_URI: "{{ ldap_bind_server }}"
    AUTH_LDAP_BIND_DN: "{{ ldab_bind_dn }}"
    AUTH_LDAP_BIND_PASSWORD: "{{ ldap_bind_passwd }}"
    AUTH_LDAP_START_TLS: false
    AUTH_LDAP_CONNECTION_OPTIONS:
      OPT_REFERRALS: 0,
      OPT_NETWORK_TIMEOUT: 30
    AUTH_LDAP_USER_SEARCH: "{{ ldap_user_search_settings }}"
    AUTH_LDAP_USER_ATTR_MAP:
      email: 'mail'
      last_name: 'sn'
      first_name: 'givenName'
    AUTH_LDAP_GROUP_SEARCH: "{{ ldap_group_search_settings }}"
    AUTH_LDAP_GROUP_TYPE: 'NestedMemberDNGroupType'
    AUTH_LDAP_GROUP_TYPE_PARAMS:
      name_attr: 'cn'
      member_attr: 'member'
    AUTH_LDAP_REQUIRE_GROUP: ''
    AUTH_LDAP_USER_FLAGS_BY_GROUP:
      is_superuser: 
        - ''
    AUTH_LDAP_ORGANIZATION_MAP:
      Some Org:
        users:
          - ''
        admins: ''
        remove_admins: false
    AUTH_LDAP_TEAM_MAP:
      Some Team:
        users: ''
        organization: ''
      Use_Demo:
        users: ''
        organization: 'Default'
    GALAXY_IGNORE_CERTS: true
    ALLOW_OAUTH2_FOR_EXTERNAL_USERS: true
...
