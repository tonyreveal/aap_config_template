# Refer to https://github.com/redhat-cop/infra.aap_configuration/tree/devel/roles/controller_credentials
# for documentation and additional parameter information

---
controller_credentials: []
  - name: 'Hub Published Collections'
    credential_type: 'Ansible Galaxy/Automation Hub API Token'
    inputs:
      url: "{{ hub_published_url }}"
    state: "{{ absent_present }}"

  - name: 'Hub Certified Collections'
    credential_type: 'Ansible Galaxy/Automation Hub API Token'
    inputs:
      "{{ hub_certified_url }}"
    state: "{{ absent_present }}"

  - name: 'Hub Validated Collections'
    credential_type: 'Ansible Galaxy/Automation Hub API Token'
    inputs:
      url: "{{ hub_validated_url }}"
    state: "{{ absent_present }}"

  - name: 'Hub Community Collections'
    credential_type: 'Ansible Galaxy/Automation Hub API Token'
    inputs:
      url: "{{ hub_community_url }}"
    state: "{{ absent_present }}"

