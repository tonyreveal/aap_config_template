---
- name: Apply Ansible Automation Platform configuration from YAML definitions
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    absent_present: "{{ state | default('present') }}"
    which_org: ''

  pre_tasks:
    - name: Include vars for AAP 2.5 and newer
      ansible.builtin.include_vars:
        file: '../controller_vars/secrets.yml'

    - name: Include workflow definitions
      ansible.builtin.include_vars:
        file: '../controller_vars/controller_workflows.yml'

  tasks:
    - name: 'Include task for managing workflow templates'
      when: controller_workflows | length is not match('0')
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_workflow_job_templates
...
