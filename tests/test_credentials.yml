---
- name: Apply Ansible Automation Platform configuration from YAML definitions
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    absent_present: "{{ state | default('present') }}"
    which_org: ''

  pre_tasks:
    - name: "Include AAP host and credential info from vault"
      ansible.builtin.include_vars:
        file: "../controller_vars/secrets.yml"

    - name: Include credential definitions
      ansible.builtin.include_vars:
        file: '../controller_vars/controller_credentials.yml'

  tasks:
    - name: 'Include task for managing credentials'
      when:
        - controller_credentials is defined
        - controller_credentials | length is not match('0')
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_credentials
...
