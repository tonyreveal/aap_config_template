---
- name: Apply Ansible Automation Platform configuration from YAML definitions
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    absent_present: "{{ state | default('present') }}"
    which_org: ''
    aap25_version: 4.6.6

  pre_tasks:
    - name: "Include AAP host and credential info from vault"
      ansible.builtin.include_vars:
        file: "controller_vars/controller_vars.yml"

    - name: Include vars for AAP 2.5 and newer
      ansible.builtin.include_vars:
        file: 'controller_vars/2.5_and_newer/secrets.yml'

    - name: Include workflow definitions
      ansible.builtin.include_vars:
        file: 'controller_vars/2.5_and_newer/controller_credential_types.yml'

  tasks:
    - name: 'Include task for managing credential types'
      when: controller_credential_types | length is not match('0')
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_credential_types
...
