---
- name: Apply Ansible Automation Platform configuration from YAML definitions
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    absent_present: "{{ state | default('present') }}"
    which_org: ''

  pre_tasks:
    - name: Include vars for AAP 2.5 and newer
      ansible.builtin.include_vars:
        file: '../controller_vars/secrets.yml'
    
    - name: Include vars for gateway authenticators
      ansible.builtin.include_vars:
        file: '../controller_vars/gateway_authenticators.yml'
    
    - name: Include vars for gateway authenticator maps
      ansible.builtin.include_vars:
        file: '../controller_vars/gateway_authenticator_maps.yml'

  tasks:
    - name: 'Include task for managing LDAP settings'
      when:
        - gateway_authenticators is defined
        - gateway_authenticators | length is not match('0')
      ansible.builtin.include_role:
        name: infra.aap_configuration.gateway_authenticators

    - name: 'Include task for managing LDAP mappings'
      when:
        - gateway_authenticators_maps is defined
        - gateway_authenticators_maps | length is not match('0')
      ansible.builtin.include_role:
        name: infra.aap_configuration.gateway_authenticator_maps
...
