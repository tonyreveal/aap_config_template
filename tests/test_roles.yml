---
- name: Apply Ansible Automation Platform configuration from YAML definitions
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    absent_present: "{{ state | default('present') }}"
    which_org: ''

  pre_tasks:
    - name: "Include AAP host and credential info from vault"
      ansible.builtin.include_vars:
        file: "../controller_vars/secrets.yml"

    - name: Include teams definitions
      ansible.builtin.include_vars:
        file: '../controller_vars/aap_teams.yml'

    - name: Include roles definitions
      ansible.builtin.include_vars:
        file: '../controller_vars/controller_roles.yml'

  tasks:
    - name: 'Include task for managing teams'
      when:
        - aap_teams is defined
        - aap_teams | length is not match('0')
      ansible.builtin.include_role:
        name: infra.aap_configuration.gateway_teams

    - name: 'Include task for managing roles'
      when:
        - controller_roles is defined
        - controller_roles | length is not match('0')
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_roles
...
